// Protobuf message definitions for DecentralChain swap client.
// Reverse-engineered and verified from @keeper-wallet/swap-client v0.3.0
syntax = "proto3";

package proto;

message Request {
  oneof payload {
    Exchange exchange = 1;
  }

  message Exchange {
    string id = 1;
    string source = 2;
    string target = 3;
    int64  amount = 4;
    int32  slippageTolerance = 5;
    string recipient = 6;
    string referrer = 7;
  }
}

message Response {
  string id = 1;

  oneof payload {
    Exchange exchange = 2;
  }

  message Error {
    CODES  code = 1;
    string message = 2;

    enum CODES {
      UNAVAILABLE = 0;
      UNEXPECTED = 1;
      INVALID_ASSET_PAIR = 2;
      INVALID_ARGUMENTS = 3;
    }
  }

  message Exchange {
    string vendor = 1;

    oneof result {
      Data  data = 2;
      Error error = 3;
    }

    message Transaction {
      string dApp = 1;
      Call   call = 2;

      message Argument {
        oneof value {
          int64  integerValue = 1;
          bytes  binaryValue = 2;
          string stringValue = 3;
          bool   booleanValue = 4;
          List   list = 10;
        }

        message List {
          repeated Argument items = 1;
        }
      }

      message Call {
        string            function = 1;
        repeated Argument arguments = 2;
      }
    }

    message Data {
      int64       amount = 1;
      double      priceImpact = 3;
      Transaction transaction = 5;
      int64       minReceived = 6;
      int64       originalAmount = 7;
      int64       originalMinReceived = 8;
    }
  }
}
